
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Campus Collective</title>

    <link rel="icon" type="image/x-icon" href="Images/campus collective icon.ico">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Smooth Scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Sidebar Transition */
        #sidebar {
            transition: transform 0.35s ease-in-out;
        }

        /* Tab animation */
        .tab-content {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .tab-content.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Loader */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .dark #loader-overlay {
            background: rgba(17, 24, 39, 0.95);
        }

        .loader-ring {
            width: 150px;
            height: 150px;
            border: 4px solid transparent;
            border-top: 4px solid #2563eb;
            border-bottom: 4px solid #ff6600;
            border-radius: 50%;
            animation: spin-ring 1.5s linear infinite;
        }

        @keyframes spin-ring {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            animation: spin-3d 3s infinite ease-in-out;
        }

        @keyframes spin-3d {
            0% {
                transform: rotateY(0deg);
            }

            50% {
                transform: rotateY(180deg);
            }

            100% {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <!-- LOADER -->
    <div id="loader-overlay" class="hidden">
        <div class="loader-ring"></div>
        <img src="Images/Campus collective logo origin.jpg" alt="Loading..." class="loader-logo mt-4">
        <p class="loader-text mt-3 font-bold text-blue-600 text-xs uppercase tracking-widest">Loading...</p>
    </div>

    <!-- MAIN WRAPPER -->
    <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside id="sidebar"
            class="w-64 bg-white dark:bg-gray-800 shadow-xl p-6 flex flex-col justify-between fixed md:static h-full z-20 transform -translate-x-full md:translate-x-0">

            <div>
                <h2 class="text-2xl font-bold text-blue-600 dark:text-blue-400 mb-6">Seller Hub</h2>

                <!-- Profile -->
                <div class="border-b pb-4 mb-6">
                    <h3 id="profile-name" class="text-lg font-semibold">Loading...</h3>
                    <p id="profile-email" class="text-sm text-gray-500">email@example.com</p>

                    <div class="mt-2 flex gap-2 items-center">
                        <p id="profile-role" class="text-xs font-mono text-blue-600 dark:text-blue-400">SELLER</p>
                        <span id="account-status"
                            class="px-2 py-1 text-[10px] rounded-full bg-gray-200 text-gray-700 font-bold">ACTIVE</span>
                    </div>
                </div>

                <!-- Navigation -->
                <nav class="space-y-2">
                    <button id="tab-orders" onclick="switchTab('orders')"
                        class="tab-button w-full p-3 rounded-lg bg-blue-600 text-white flex items-center">
                        Orders Management
                    </button>

                    <button id="tab-products" onclick="switchTab('products')"
                        class="tab-button w-full p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center">
                        Product Inventory
                    </button>
                </nav>
            </div>

            <!-- Logout -->
            <button onclick="handleLogout()"
                class="w-full mt-6 py-2 px-4 text-sm font-medium text-white bg-red-500 rounded-md hover:bg-red-600">
                Logout
            </button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-grow md:ml-64 p-6 md:p-10">

            <!-- Mobile Menu Button -->
            <button id="menu-toggle"
                class="md:hidden mb-4 p-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700">
                ☰ Menu
            </button>

            <h1 class="text-4xl font-extrabold mb-6">Dashboard Overview</h1>

            <div id="message-area" class="hidden p-3 rounded-lg text-sm font-medium mb-6"></div>

            <!-- PRODUCTS TAB -->
            <section id="content-products" class="tab-content hidden">
                <div class="flex justify-between mb-6">
                    <h2 class="text-2xl font-semibold">Your Products</h2>

                    <button onclick="triggerLoader('add product.html', 'Opening Product Creator...')"
                        class="py-2 px-4 bg-green-600 hover:bg-green-700 text-white rounded-md text-sm">
                        + Add New Product
                    </button>
                </div>

                <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-300 uppercase text-xs">
                            <tr>
                                <th class="px-6 py-3">Product</th>
                                <th class="px-6 py-3">Price</th>
                                <th class="px-6 py-3">Stock</th>
                                <th class="px-6 py-3">Special</th>
                                <th class="px-6 py-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="products-table-body"></tbody>
                    </table>
                </div>
            </section>

            <!-- ORDERS TAB -->
            <section id="content-orders" class="tab-content hidden">
                <h2 class="text-2xl font-semibold mb-6">Pending & Recent Orders</h2>

                <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 dark:bg-gray-700 uppercase text-xs">
                            <tr>
                                <th class="px-6 py-3">Order ID</th>
                                <th class="px-6 py-3">Date</th>
                                <th class="px-6 py-3">Customer</th>
                                <th class="px-6 py-3">Items</th>
                                <th class="px-6 py-3">Status</th>
                                <th class="px-6 py-3">Action</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body"></tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <!-- MODAL -->
    <div id="order-update-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-30">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl w-full max-w-md">
            <div class="flex justify-between items-center border-b pb-2 mb-4">
                <h3 class="text-lg font-semibold">Update Order</h3>
                <button onclick="closeModal('order-update-modal')" class="text-gray-400 hover:text-gray-600">×</button>
            </div>

            <form id="order-update-form" data-order-id="">
                <label class="block text-sm font-medium mb-1">Order Status:</label>
                <select id="order-status" class="w-full p-2 rounded border dark:bg-gray-700 mb-4">
                    <option>Processing</option>
                    <option>Shipped</option>
                    <option>Delivered</option>
                    <option>Cancelled</option>
                </select>

                <label class="block text-sm font-medium mb-1">Tracking Number:</label>
                <input type="text" id="tracking-number"
                    class="w-full p-2 mb-6 rounded border dark:bg-gray-700" placeholder="Enter tracking #">

                <button type="submit"
                    class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        const API_BASE_URL = "/api";
        const LOGIN_PAGE = "login czra.html";

        const AUTH_TOKEN = localStorage.getItem("jwtToken");
        const SELLER_ID = localStorage.getItem("userId");

        const profileName = document.getElementById("profile-name");
        const profileEmail = document.getElementById("profile-email");
        const accountStatus = document.getElementById("account-status");

        const productsTableBody = document.getElementById("products-table-body");
        const ordersTableBody = document.getElementById("orders-table-body");

        const sidebar = document.getElementById("sidebar");
        const menuBtn = document.getElementById("menu-toggle");


        /* ------------------------------
           Smooth Mobile Sidebar Toggle
        -------------------------------- */
        menuBtn.addEventListener("click", () => {
            if (sidebar.classList.contains("-translate-x-full")) {
                sidebar.classList.remove("-translate-x-full");
            } else {
                sidebar.classList.add("-translate-x-full");
            }
        });

        /* Loader Trigger */
        window.triggerLoader = (url, text) => {
            const loader = document.getElementById("loader-overlay");
            document.querySelector(".loader-text").textContent = text;
            loader.classList.remove("hidden");

            setTimeout(() => window.location.href = url, 1200);
        };

        /* Show Messages */
        function showMessage(type, message) {
            const box = document.getElementById("message-area");
            box.textContent = message;
            box.className =
                `p-3 rounded-lg mb-6 text-sm font-medium ${type === "success"
                    ? "bg-green-100 text-green-800"
                    : "bg-red-100 text-red-800"}`;
            box.classList.remove("hidden");

            setTimeout(() => box.classList.add("hidden"), 5000);
        }

        /* Sidebar User Info */
        async function fetchUserDetails() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/me`, {
                    headers: { Authorization: `Bearer ${AUTH_TOKEN}` }
                });

                if (!response.ok) throw new Error("Failed to fetch user details");

                const user = await response.json();

                profileName.textContent =
                    user.businessName ||
                    localStorage.getItem("businessName") ||
                    "Unknown Seller";

                profileEmail.textContent =
                    user.email ||
                    localStorage.getItem("sellerEmail") ||
                    "No Email";

                accountStatus.textContent = "ACTIVE";
                accountStatus.className =
                    "px-2 py-1 text-[10px] rounded-full bg-green-200 text-green-800 font-bold";

            } catch (err) {
                console.error(err);
            }
        }

        /* Tab Switching (Smooth Animations) */
        window.switchTab = (tabName) => {
            document.querySelectorAll(".tab-button").forEach(btn => {
                btn.classList.remove("bg-blue-600", "text-white");
                btn.classList.add("hover:bg-gray-100", "dark:hover:bg-gray-700");
            });

            document.getElementById(`tab-${tabName}`).classList.add(
                "bg-blue-600",
                "text-white"
            );

            document.querySelectorAll(".tab-content").forEach(section => {
                section.classList.remove("active");
                section.classList.add("hidden");
            });

            const activeTab = document.getElementById(`content-${tabName}`);
            activeTab.classList.remove("hidden");

            setTimeout(() => activeTab.classList.add("active"), 10);

            if (tabName === "products") fetchProducts();
            if (tabName === "orders") fetchOrders();
        };


        /* Fetch Products */
        async function fetchProducts() {
            productsTableBody.innerHTML =
                `<tr><td colspan="5" class="p-4 text-center">Loading...</td></tr>`;

            try {
                const res = await fetch(`${API_BASE_URL}/seller/products`, {
                    headers: { Authorization: `Bearer ${AUTH_TOKEN}` }
                });

                if (!res.ok) throw new Error("Failed to load products");

                const products = await res.json();

                if (!products.length) {
                    productsTableBody.innerHTML =
                        `<tr><td colspan="5" class="p-4 text-center">No products found</td></tr>`;
                    return;
                }

                productsTableBody.innerHTML = products
                    .map(
                        (p) => `
                    <tr class="border-b hover:bg-gray-50 dark:hover:bg-gray-700">
                        <td class="px-6 py-4">${p.name}</td>
                        <td class="px-6 py-4">R ${p.price.toFixed(2)}</td>
                        <td class="px-6 py-4">${p.stock}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-xs ${p.onSpecial
                                ? "bg-green-200 text-green-800"
                                : "bg-gray-300 text-gray-800"}">
                                ${p.onSpecial ? "Active" : "Inactive"}
                            </span>
                        </td>
                        <td class="px-6 py-4 space-x-2">
                            <a href="edit-product.html?id=${p._id}"
                                class="text-blue-600 hover:text-blue-800">Edit</a>
                            <button onclick="deleteProduct('${p._id}')"
                                class="text-red-600 hover:text-red-800">Delete</button>
                        </td>
                    </tr>`
                    )
                    .join("");

            } catch (e) {
                productsTableBody.innerHTML =
                    `<tr><td colspan="5" class="p-4 text-center text-red-500">${e.message}</td></tr>`;
            }
        }

        /* Delete Product */
        window.deleteProduct = async function (id) {
            if (!confirm("Delete this product?")) return;

            try {
                const res = await fetch(`${API_BASE_URL}/seller/products/${id}`, {
                    method: "DELETE",
                    headers: { Authorization: `Bearer ${AUTH_TOKEN}` }
                });

                if (!res.ok) throw new Error("Failed to delete product");

                showMessage("success", "Product deleted");
                fetchProducts();

            } catch (e) {
                showMessage("error", e.message);
            }
        };

        /* Fetch Orders */
        async function fetchOrders() {
            ordersTableBody.innerHTML =
                `<tr><td colspan="6" class="p-4 text-center">Loading...</td></tr>`;

            try {
                const res = await fetch(`${API_BASE_URL}/seller/orders`, {
                    headers: { Authorization: `Bearer ${AUTH_TOKEN}` }
                });

                if (!res.ok) throw new Error("Failed to load orders");

                const orders = await res.json();

                if (!orders.length) {
                    ordersTableBody.innerHTML =
                        `<tr><td colspan="6" class="p-4 text-center">No orders found</td></tr>`;
                    return;
                }

                ordersTableBody.innerHTML = orders
                    .map(
                        (o) => `
                    <tr class="border-b hover:bg-gray-50 dark:hover:bg-gray-700">
                        <td class="px-6 py-4">#${o._id.slice(0, 8)}</td>
                        <td class="px-6 py-4">${new Date(o.createdAt).toLocaleDateString()}</td>
                        <td class="px-6 py-4">${o.customerName || "N/A"}</td>
                        <td class="px-6 py-4">${o.items.length}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-xs ${
                                {
                                    Pending: "bg-yellow-200 text-yellow-800",
                                    Processing: "bg-yellow-300 text-yellow-900",
                                    Shipped: "bg-blue-200 text-blue-800",
                                    Delivered: "bg-green-200 text-green-800",
                                    Cancelled: "bg-red-200 text-red-800"
                                }[o.status]
                            }">${o.status}</span>
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="openModal('${o._id}', '${o.status}')"
                                class="text-blue-600 hover:text-blue-800">Update</button>
                        </td>
                    </tr>`
                    )
                    .join("");

            } catch (e) {
                ordersTableBody.innerHTML =
                    `<tr><td colspan="6" class="p-4 text-center text-red-500">${e.message}</td></tr>`;
            }
        }

        /* Modal Actions */
        window.openModal = function (id, status) {
            document.getElementById("modal-order-id").textContent = id.slice(0, 8);
            document.getElementById("order-status").value = status;
            document.getElementById("order-update-form").dataset.orderId = id;

            const modal = document.getElementById("order-update-modal");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        };

        window.closeModal = function (id) {
            const modal = document.getElementById(id);
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        };

        /* Update Order */
        document.getElementById("order-update-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const orderId = e.target.dataset.orderId;
            const status = document.getElementById("order-status").value;
            const tracking = document.getElementById("tracking-number").value;

            try {
                const res = await fetch(`${API_BASE_URL}/seller/orders/${orderId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${AUTH_TOKEN}`
                    },
                    body: JSON.stringify({ status, trackingNumber: tracking })
                });

                if (!res.ok) throw new Error("Failed to update order");

                closeModal("order-update-modal");
                showMessage("success", "Order Updated");
                fetchOrders();

            } catch (e) {
                showMessage("error", e.message);
            }
        });

        /* Logout */
        window.handleLogout = () => {
            localStorage.clear();
            showMessage("success", "Logging out...");
            setTimeout(() => (window.location.href = LOGIN_PAGE), 1000);
        };

        /* Init */
        document.addEventListener("DOMContentLoaded", () => {
            if (!AUTH_TOKEN || !SELLER_ID) {
                window.location.href = LOGIN_PAGE;
                return;
            }

            fetchUserDetails();
            switchTab("orders");
        });
    </script>
</body>

</html>
